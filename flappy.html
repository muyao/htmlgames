<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Cube</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2b2b2b;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            background-color: #87CEEB; /* Sky blue */
            border: 4px solid #fff;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        #instructions {
            position: absolute;
            top: 20px;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="instructions">
        <h2>Flappy Cube</h2>
        <p>Press <strong>SPACEBAR or CLICK</strong> to jump.</p>
    </div>

    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Game state
        let frames = 0;
        let score = 0;
        let gameOver = false;

        // Player object (The Block)
        const bird = {
            x: 60,
            y: 150,
            width: 24,
            height: 24,
            gravity: 0.3,
            velocity: 0,
            lift: -6,

            draw() {
                ctx.fillStyle = "#FFD700"; // Gold
                ctx.fillRect(this.x, this.y, this.width, this.height);
                // Draw an eye for personality
                ctx.fillStyle = "black";
                ctx.fillRect(this.x + 16, this.y + 4, 4, 4);
            },

            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;

                // Hit the ground
                if (this.y + this.height >= canvas.height) {
                    this.y = canvas.height - this.height;
                    gameOver = true;
                }
                
                // Hit the ceiling
                if (this.y <= 0) {
                    this.y = 0;
                    this.velocity = 0;
                }
            },

            flap() {
                this.velocity = this.lift;
            }
        };

        // Obstacles (The Pipes)
        const pipes = [];
        const pipeWidth = 50;
        const pipeGap = 130;
        const pipeSpeed = 3;

        function drawAndManagePipes() {
            ctx.fillStyle = "#2E8B57"; // Sea Green
            for (let i = 0; i < pipes.length; i++) {
                let p = pipes[i];        
                ctx.fillRect(p.x, 0, pipeWidth, p.top);
                ctx.fillRect(p.x, canvas.height - p.bottom, pipeWidth, p.bottom);        
                p.x -= pipeSpeed;

                // Collision detection
                if (bird.x < p.x + pipeWidth && 
                    bird.x + bird.width > p.x && 
                    (bird.y < p.top || bird.y + bird.height > canvas.height - p.bottom)) {
                    gameOver = true;
                }

                // NEW SCORE LOGIC: If bird passes the pipe and it hasn't been counted yet
                if (bird.x > p.x + pipeWidth && !p.passed) {
                    score++;
                    p.passed = true; // Mark as counted
                }

                if (p.x + pipeWidth < 0) {
                    pipes.shift();
                    i--; 
                }
            }
        }

        function spawnPipe() {
            if (frames % 90 === 0) {
                let topH = Math.random() * (canvas.height - pipeGap - 60) + 30;
                let bottomH = canvas.height - topH - pipeGap;        
                pipes.push({
                    x: canvas.width,
                    top: topH,
                    bottom: bottomH,
                    passed: false
                });
            }
        }

        function resetGame() {
            bird.y = 150;
            bird.velocity = 0;
            pipes.length = 0; // Clear the array
            score = 0;
            frames = 0;
            gameOver = false;
            loop(); // Restart the animation loop
        }

        // Input listener
        document.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                // Prevent default scrolling behavior
                e.preventDefault(); 
                if (gameOver) {
                    resetGame();
                } else {
                    bird.flap();
                }
            }
        });

        document.addEventListener("click", (e) => {
                e.preventDefault(); 
                if (gameOver) {
                    resetGame();
                } else {
                    bird.flap();
                }
        });

        // Main game loop
        function loop() {
            if (gameOver) {
                // Dim the screen
                ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw Game Over text
                ctx.fillStyle = "white";
                ctx.font = "bold 36px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.font = "24px Arial";
                ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
                
                ctx.font = "16px Arial";
                ctx.fillText("Press SPACEBAR or CLICK to restart", canvas.width / 2, canvas.height / 2 + 60);
                return; // Stop requesting animation frames
            }

            // Clear canvas for the next frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update and draw entities
            bird.update();
            bird.draw();
            
            spawnPipe();
            drawAndManagePipes();

            // Draw Score
            ctx.fillStyle = "black";
            ctx.font = "bold 24px Arial";
            ctx.textAlign = "left";
            ctx.fillText(`Score: ${score}`, 15, 35);

            frames++;
            requestAnimationFrame(loop);
        }

        // Start the game
        loop();
    </script>
</body>
</html>
