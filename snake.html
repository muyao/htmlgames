<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Game</title>
    
    <style>
        body {
            background-color: #1e1e24;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            text-align: center;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #4CAF50;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #scoreboard {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: bold;
        }
        canvas {
            background-color: #111111;
            border: 4px solid #4CAF50;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.4);
        }
        .instructions {
            margin-top: 15px;
            color: #aaaaaa;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Snake</h1>
        <div id="scoreboard">Score: <span id="score">0</span></div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="instructions">Use <b>Arrow Keys</b> or <b>W A S D</b> to move.</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // Grid size and movement speed
        const gridSize = 20;
        let gameSpeed = 100; // Milliseconds per frame

        // Initialize game variables
        let snake = [
            { x: 200, y: 200 },
            { x: 180, y: 200 },
            { x: 160, y: 200 }
        ];
        let foodX;
        let foodY;
        let dx = gridSize; // Moving right initially
        let dy = 0;
        let score = 0;
        let changingDirection = false;

        // Start the game
        createFood();
        main();

        // Listen for keyboard input
        document.addEventListener("keydown", changeDirection);

        // Main game loop
        function main() {
            if (hasGameEnded()) {
                alert(`Game Over! Your final score is ${score}.\nRefresh the page to play again.`);
                return;
            }

            changingDirection = false;
            
            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, gameSpeed);
        }

        // Wipe the canvas clean each frame
        function clearCanvas() {
            ctx.fillStyle = "#111111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Draw the food apple
        function drawFood() {
            ctx.fillStyle = "#FF5722";
            ctx.strokeStyle = "#111111";
            
            // Draw a circle for the food
            ctx.beginPath();
            ctx.arc(foodX + gridSize/2, foodY + gridSize/2, gridSize/2 - 2, 0, 2 * Math.PI);
            ctx.fill();
            ctx.stroke();
        }

        // Draw the entire snake
        function drawSnake() {
            snake.forEach((part, index) => {
                // Head is a different color than the body
                ctx.fillStyle = index === 0 ? "#81C784" : "#4CAF50";  
                ctx.strokeStyle = "#111111";
                
                // Draw rounded rectangles for the snake segments
                ctx.fillRect(part.x, part.y, gridSize, gridSize);
                ctx.strokeRect(part.x, part.y, gridSize, gridSize);
            });
        }

        // Move the snake forward
        function advanceSnake() {
            // Calculate new head position
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); // Add new head

            // Check if snake ate food
            const didEatFood = snake[0].x === foodX && snake[0].y === foodY;
            if (didEatFood) {
                score += 10;
                scoreElement.textContent = score;
                
                // Slightly increase speed as score goes up
                if (gameSpeed > 50) gameSpeed -= 2; 
                
                createFood();
            } else {
                // If it didn't eat, remove the tail piece so it "moves"
                snake.pop();
            }
        }

        // Generate a random coordinate aligned to the grid
        function randomGridCoord(min, max) {
            return Math.round((Math.random() * (max - min) + min) / gridSize) * gridSize;
        }

        // Place food on a random spot not occupied by the snake
        function createFood() {
            foodX = randomGridCoord(0, canvas.width - gridSize);
            foodY = randomGridCoord(0, canvas.height - gridSize);
            
            // If the new food spawns inside the snake, try again
            snake.forEach(function isFoodOnSnake(part) {
                if (part.x === foodX && part.y === foodY) createFood();
            });
        }

        // Handle directional input
        function changeDirection(event) {
            if (changingDirection) return; // Prevent reversing into oneself quickly
            
            const key = event.key;
            
            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if ((key === "ArrowLeft" || key === "a" || key === "A") && !goingRight) {
                dx = -gridSize;
                dy = 0;
                changingDirection = true;
            }
            if ((key === "ArrowUp" || key === "w" || key === "W") && !goingDown) {
                dx = 0;
                dy = -gridSize;
                changingDirection = true;
            }
            if ((key === "ArrowRight" || key === "d" || key === "D") && !goingLeft) {
                dx = gridSize;
                dy = 0;
                changingDirection = true;
            }
            if ((key === "ArrowDown" || key === "s" || key === "S") && !goingUp) {
                dx = 0;
                dy = gridSize;
                changingDirection = true;
            }
        }

        // Check for collisions with walls or self
        function hasGameEnded() {
            // Self-collision (start loop from 4 since a length-3 snake can't bite itself)
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }

            // Wall collisions
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= canvas.width;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= canvas.height;

            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }
    </script>
</body>
</html>
